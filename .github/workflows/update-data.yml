name: Nightly PFAS Data Update & Deploy

on:
  push:
    branches: [master]
  schedule:
    # 02:00 EST = 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest PFAS data
        run: node scripts/fetch-pfas-data.js
        env:
          NODE_OPTIONS: "--experimental-vm-modules"

      - name: Fetch county news (no-AI mode — Gemma runs locally)
        run: node scripts/fetch-county-news.js --no-ai
        continue-on-error: true   # don't block deploy if news sources are unavailable

      - name: Build static site
        run: npm run build

      - name: Install Wrangler
        run: npm install -g wrangler@3

      - name: Publish to Cloudflare Pages
        env:
          RAW_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN=$(echo "$RAW_CF_TOKEN" | tr -d '[:space:]')
          export CLOUDFLARE_ACCOUNT_ID=$(echo "$RAW_CF_ACCOUNT" | tr -d '[:space:]')
          wrangler pages deploy out \
            --project-name=tossonanalytics \
            --branch=master \
            --commit-dirty=true

      - name: Commit updated data files
        run: |
          git config user.name  "Tosson Data Bot"
          git config user.email "bot@tossonanalytics.com"
          git add public/data/pfas-nc-data.json public/data/county-news.json
          git diff --staged --quiet || git commit -m "chore: nightly data update $(date -u +%Y-%m-%d)"
          git push
